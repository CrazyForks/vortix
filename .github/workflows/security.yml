name: Security

on:
  # Doc-only changes skip Security — cargo-deny audits Cargo.lock; a
  # markdown-only PR cannot affect the dependency tree.
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
      - "CHANGELOG.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
      - "CHANGELOG.md"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
