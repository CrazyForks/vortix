# Restrict cargo-deny's scan to the platforms we actually ship binaries
# for. Without this, target-conditional deps that we NEVER compile
# (e.g. `clipboard-win` + `error-code` pulled by `arboard` only on
# `cfg(windows)`) still appear in `Cargo.lock` and get audited. Scoping
# to our real targets keeps the audit honest — we only enforce license /
# advisory rules against code that ends up in a vortix binary.
#
# These MUST stay in sync with `dist-workspace.toml`'s `[dist].targets`.
# A new release target added there without a matching entry here would
# silently drop musl-only / arch-only crates out of audit scope.
[graph]
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "aarch64-unknown-linux-gnu" },
    { triple = "x86_64-unknown-linux-musl" },
    { triple = "aarch64-unknown-linux-musl" },
    { triple = "x86_64-apple-darwin" },
    { triple = "aarch64-apple-darwin" },
]

[advisories]
ignore = [
    # rand 0.8 unsoundness with custom logger + rand::rng() reseeding.
    # We don't use rand::rng() from a custom logger; safe to ignore until rand 0.9 upgrade.
    "RUSTSEC-2026-0097",
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    # CDLA-Permissive-2.0: a Linux Foundation permissive data-sharing
    # license. Used by `webpki-roots` to redistribute the Mozilla CA
    # trust bundle, which `reqwest`'s `rustls-tls` feature pulls in for
    # TLS verification (plan 002 U9). The license is the data-flavored
    # analog of MIT/Apache — modification + redistribution permitted,
    # no warranty. Allowing it has the same risk profile as MIT.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "warn"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
