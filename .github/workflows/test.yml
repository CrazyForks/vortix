name: Test

on:
  # Doc-only PRs skip Test (the slowest job). Lint, Boundary, and
  # Security still run on the same PR so the check list isn't empty.
  # Cargo.toml / Cargo.lock changes (which COULD be hidden dep edits)
  # are intentionally NOT in paths-ignore — they always trigger Test.
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
      - "CHANGELOG.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
      - "CHANGELOG.md"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust-setup
      - name: Install VPN tools (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y wireguard-tools openvpn
      - name: Install VPN tools (macOS)
        if: runner.os == 'macOS'
        run: brew install wireguard-tools openvpn
      - run: cargo test --workspace

  test-fedora:
    name: Test (fedora-41)
    runs-on: ubuntu-latest
    container:
      image: fedora:41
    steps:
      - name: Bootstrap Fedora container
        run: |
          dnf install -y ca-certificates curl gcc gcc-c++ git make nftables openvpn pkgconf-pkg-config shadow-utils which wireguard-tools
          useradd -m tester
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.91.0"
      - uses: Swatinem/rust-cache@v2
      - name: Prepare tester workspace and Rust toolchain
        run: |
          chown -R tester:tester "$GITHUB_WORKSPACE"
          cp -a "$HOME/.cargo" /home/tester/
          cp -a "$HOME/.rustup" /home/tester/
          chown -R tester:tester /home/tester/.cargo /home/tester/.rustup
      - run: su - tester -c "cd \"$GITHUB_WORKSPACE\" && source \"\$HOME/.cargo/env\" && cargo test --workspace"
