# Plan 015 phase B / plan 012 — CI integration tests
#
# Drives the vortix binary against real wg-quick + openvpn + iptables /
# nftables in privileged Docker containers with `ip netns` namespaces.
# Matrix covers Ubuntu (iptables-nft compat) + Fedora (native nft) so
# we catch behavioral differences between the two firewall backends.
# macOS integration parity is deferred to a follow-up plan because
# GitHub Actions' macOS runners don't easily support netns / sandboxed
# wg-quick.

name: Integration Tests

on:
  # Doc-only changes skip Integration — these tests drive the real
  # vortix binary against real wg-quick + iptables; markdown can't
  # affect kernel behavior. Cron + workflow_dispatch are unaffected
  # by paths-ignore so nightly runs continue regardless of PR shape.
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
      - "CHANGELOG.md"
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
      - "CHANGELOG.md"
  schedule:
    # Nightly so flake rate is observable.
    - cron: "30 5 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  integration:
    name: Integration / ${{ matrix.distro.label }}
    strategy:
      # Each distro is independent — if Ubuntu finds a real regression
      # we still want to see Fedora's signal (and vice versa).
      fail-fast: false
      matrix:
        distro:
          - label: ubuntu-22.04
            dockerfile: Dockerfile
            image_tag: vortix-integration-ubuntu
          - label: fedora-41
            dockerfile: Dockerfile.fedora
            image_tag: vortix-integration-fedora
    runs-on: ubuntu-latest
    # Hard-gated: a failed integration test fails the PR check.
    # Killswitch is Vortix's core product promise — regressions here
    # are silent betrayals of users who think they're protected.
    # If a flake fires, the right move is to fix the flake, not to
    # re-soft-gate.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Build integration harness image (${{ matrix.distro.label }})
        run: |
          docker build \
              -t ${{ matrix.distro.image_tag }} \
              -f tests/integration/${{ matrix.distro.dockerfile }} \
              tests/integration/

      - name: Run integration tests (${{ matrix.distro.label }})
        # --privileged: required for `ip netns` + iptables manipulation
        # --network host: avoid docker0 interfering with the test netns
        run: |
          docker run --privileged --network host --rm \
              -v "$PWD:/workspace" \
              -w /workspace \
              ${{ matrix.distro.image_tag }} \
              bash -c '
                set -euo pipefail
                cargo build --release -p vortix --locked
                bash tests/integration/setup-netns.sh
                bash tests/integration/wg_happy_path.sh
                bash tests/integration/killswitch.sh
                bash tests/integration/teardown-netns.sh
              '
