name: Installation Sanity

on:
  schedule:
    # Weekly on Monday at 06:00 UTC — install paths don't break daily on
    # a stable release line; weekly drift detection is enough. Same-day
    # packaging breaks are caught by the `release` trigger below.
    - cron: "0 6 * * 1"
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  install:
    name: install (${{ matrix.method }}, ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        method: [cargo-install, shell-installer, static-binary, homebrew, npm-install]
        os: [ubuntu-latest, macos-latest]
        exclude:
          # static-binary is the Linux-musl release artifact; no macOS variant.
          - method: static-binary
            os: macos-latest
    runs-on: ${{ matrix.os }}
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout (for shell-installer + static-binary)
        if: matrix.method == 'shell-installer' || matrix.method == 'static-binary'
        uses: actions/checkout@v4

      - name: Setup Node (npm-install)
        if: matrix.method == 'npm-install'
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'

      - name: Install Homebrew (Linux only — macOS ships it)
        if: matrix.method == 'homebrew' && runner.os == 'Linux'
        run: |
          # Homebrew on Linux now sandboxes installs via bubblewrap. The
          # default ubuntu-latest runner doesn't ship it, so brew install
          # bails with "Bubblewrap is required to use the Linux sandbox
          # but was not found." Install bwrap before bootstrapping brew.
          sudo apt-get update -qq && sudo apt-get install -y bubblewrap
          /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          echo "/home/linuxbrew/.linuxbrew/bin" >> "$GITHUB_PATH"

      - name: Install via cargo install (crates.io)
        if: matrix.method == 'cargo-install'
        # `--locked` respects vortix's published Cargo.lock. Without it,
        # cargo's resolver picks the latest semver-compatible version of
        # every transitive dep at install time, which has hit upstream
        # build breaks (e.g. `time` v0.3.x → E0119 trait conflict on
        # certain feature combos). Locked installs are reproducible.
        run: cargo install --locked vortix

      - name: Install via shell installer (latest release)
        if: matrix.method == 'shell-installer'
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf https://github.com/Harry-kp/vortix/releases/latest/download/vortix-installer.sh | sh
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Install static musl binary (Linux release artifact)
        if: matrix.method == 'static-binary'
        run: |
          TAG=$(gh release view --repo Harry-kp/vortix --json tagName -q '.tagName')
          curl -LO "https://github.com/Harry-kp/vortix/releases/download/${TAG}/vortix-x86_64-unknown-linux-musl.tar.xz"
          tar -xf vortix-x86_64-unknown-linux-musl.tar.xz
          chmod +x vortix-x86_64-unknown-linux-musl/vortix
          sudo cp vortix-x86_64-unknown-linux-musl/vortix /usr/local/bin/vortix

      - name: Install from Homebrew tap
        if: matrix.method == 'homebrew'
        run: brew install Harry-kp/tap/vortix

      - name: Install from npm
        if: matrix.method == 'npm-install'
        run: npm install -g @harry-kp/vortix

      - name: Determine expected version
        id: expected
        run: |
          if [ "$METHOD" = "cargo-install" ]; then
            VERSION=$(curl -s -H "User-Agent: vortix-ci (https://github.com/Harry-kp/vortix)" https://crates.io/api/v1/crates/vortix | python3 -c "import sys,json; print(json.load(sys.stdin)['crate']['max_version'])")
          else
            VERSION=$(gh release view --repo Harry-kp/vortix --json tagName -q '.tagName' | sed 's/^v//')
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        env:
          METHOD: ${{ matrix.method }}

      - name: Verify --version
        env:
          EXPECTED: ${{ steps.expected.outputs.version }}
        run: |
          OUTPUT=$(vortix --version)
          echo "Got: $OUTPUT"
          echo "$OUTPUT" | grep -q "$EXPECTED"

      - name: Verify --help
        run: vortix --help

      - name: "Verify sudo (Linux: cargo-install + shell-installer need symlink)"
        if: runner.os == 'Linux' && (matrix.method == 'cargo-install' || matrix.method == 'shell-installer')
        run: |
          if sudo vortix --version 2>/dev/null; then
            echo "ERROR: sudo vortix should NOT work without symlink on Linux"
            exit 1
          fi
          echo "Confirmed: sudo vortix fails without symlink (expected)"
          sudo ln -s "$HOME/.cargo/bin/vortix" /usr/local/bin/vortix
          OUTPUT=$(sudo vortix --version)
          echo "After symlink: $OUTPUT"

      - name: "Verify sudo (Linux: static-binary already in /usr/local/bin)"
        if: runner.os == 'Linux' && matrix.method == 'static-binary'
        run: |
          OUTPUT=$(sudo vortix --version)
          echo "sudo vortix works (static-binary copied to /usr/local/bin): $OUTPUT"

      - name: Verify sudo (macOS)
        if: runner.os == 'macOS'
        run: |
          OUTPUT=$(sudo vortix --version)
          echo "sudo vortix works on macOS: $OUTPUT"

  arch-linux:
    name: install (arch-linux)
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Install vortix from extra repo
        run: pacman -Syu --noconfirm vortix
      - name: Verify --version
        run: |
          OUTPUT=$(vortix --version)
          echo "Arch package version: $OUTPUT"
      - name: Verify --help
        run: vortix --help
      - name: Verify binary is in system PATH
        run: |
          LOCATION=$(command -v vortix)
          echo "Installed at: $LOCATION"
          echo "$LOCATION" | grep -qE "^/usr/(s?bin)/vortix$"
