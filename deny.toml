[advisories]
ignore = [
    # rand 0.8 unsoundness with custom logger + rand::rng() reseeding.
    # We don't use rand::rng() from a custom logger; safe to ignore until rand 0.9 upgrade.
    "RUSTSEC-2026-0097",
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "warn"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
